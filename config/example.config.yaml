# ============================================================
# Performance Observer Suite - Example Configuration
# ============================================================
# Copy this file, customize for your run, and pass with --config.
# ============================================================

# Unique identifier for this test run (auto-generated if omitted)
run_id: "baseline-run-001"

# --------------------------------------------------------
# Argo / Kubernetes namespaces
# --------------------------------------------------------
argo:
  namespace: "datalake"
  # Filter workflows by template name (partial match, case-insensitive).
  # Leave empty to observe all workflows in the namespace.
  workflow_template_filter: "ingestion"
  # Filter by label selector (standard K8s label selector syntax).
  # Leave empty to skip label filtering.
  workflow_label_selector: ""
  # Argo Server base URL. If empty, uses in-cluster kubeconfig / kubectl proxy.
  # Example: "https://argo-server.datalake.svc:2746"
  server_url: ""
  # Bearer token for Argo Server API (if auth is enabled).
  token: ""
  # Whether to verify TLS certificates when calling Argo Server REST API.
  verify_tls: true

# --------------------------------------------------------
# Kubernetes API
# --------------------------------------------------------
kubernetes:
  # Namespaces to watch for pods generated by the ingestion workflows.
  # Usually the same as argo.namespace, but may differ.
  pod_namespaces:
    - "datalake"
  # Path to kubeconfig file. Leave empty to use in-cluster service account or
  # default ~/.kube/config.
  kubeconfig: ""
  # Context to use from the kubeconfig file. Leave empty for current context.
  context: ""

# --------------------------------------------------------
# STAC catalog
# --------------------------------------------------------
stac:
  # Base URL of the STAC API (OGC API - Features / STAC API).
  endpoint: "http://stac-api.datalake.svc/api"
  # Optional Bearer token for authenticated STAC endpoints.
  token: ""
  # Collection ID to query for published items.
  collection_id: "sentinel2-l2a"
  # Whether to verify TLS certificates.
  verify_tls: true

# --------------------------------------------------------
# Polling intervals (seconds)
# --------------------------------------------------------
polling:
  workflow_status_sec: 15      # How often to poll Argo workflow list
  pod_status_sec: 20           # How often to poll pod statuses
  pod_metrics_sec: 30          # How often to poll pod CPU/memory metrics
  stac_sec: 45                 # How often to poll STAC for new items
  timeseries_flush_sec: 30     # How often to flush timeseries snapshot to disk

# --------------------------------------------------------
# Test duration / grace period
# --------------------------------------------------------
timing:
  # Maximum observer wall-clock duration (seconds). 0 = run until Ctrl-C.
  # Examples: 1800 (30 min), 14400 (4 h), 28800 (8 h), 86400 (24 h)
  max_duration_sec: 1800
  # Extra time to keep observing after the injection workflow completes,
  # to capture backlog drain and late STAC publication.
  grace_period_sec: 300

# --------------------------------------------------------
# Correlation rules
# --------------------------------------------------------
# These rules describe HOW the observer links:
#   MinIO object key  ->  Argo workflow  ->  pod/step  ->  STAC item
#
# ASSUMPTION DOCUMENTATION (adjust to your platform's conventions):
#
# 1. object_key_label:
#    The Argo workflow is expected to carry a label or parameter that contains
#    the MinIO object key (or a derivative of it). Set to the label/param name.
#    If empty, object-key-based correlation is disabled.
#
# 2. product_id_from_object_key:
#    Python regex with a named group "product_id" that extracts the product ID
#    from the MinIO object key. Example: for key
#    "s2-products/S2A_MSIL2A_20230101T100000_N0500_R022_T32TNT_20230101.zip"
#    the pattern below captures the base name without extension as product_id.
#
# 3. stac_item_id_from_product_id:
#    Python format string that derives the STAC item id from product_id.
#    Use "{product_id}" as placeholder.
#    If empty, STAC lookup falls back to searching by datetime range.
#
# 4. workflow_name_contains_product:
#    If true, the observer will try to extract product_id from workflow name
#    using product_id_from_workflow_name_regex.
#
correlation:
  object_key_label: "workflows.argoproj.io/parameter-product-key"
  product_id_from_object_key: "(?P<product_id>[^/]+)(?:\\.zip|\\.tar\\.gz|\\.tgz|)$"
  stac_item_id_from_product_id: "{product_id}"
  workflow_name_contains_product: false
  product_id_from_workflow_name_regex: "ingestion-(?P<product_id>.+)-[a-z0-9]{5}$"
  # Fallback: if direct correlation fails, match workflows created within
  # this many seconds of MinIO event time (approximate).
  time_window_fallback_sec: 60

# --------------------------------------------------------
# Step tracking
# --------------------------------------------------------
# List of workflow step names (or pod name prefixes) that are important to
# track individually. If empty, all steps are tracked.
tracked_steps:
  - "download"
  - "preprocess"
  - "index"
  - "publish"
  - "validate"

# --------------------------------------------------------
# Output
# --------------------------------------------------------
output:
  # Directory where all output files are written.
  # A sub-directory named after run_id is created automatically.
  base_dir: "./results"
  # Flush raw observations to disk every N new records.
  flush_every_n_records: 50
  # Write a checkpoint file every N seconds (0 = disabled).
  checkpoint_interval_sec: 300
