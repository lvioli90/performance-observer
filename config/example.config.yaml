# ============================================================
# Performance Observer Suite - Configuration
# Target platform: IRIDE UAT ingestion pipeline
# ============================================================
# Two sequential workflows per product:
#   1. ingestion-dispatcher  (params: s3-bucket, s3-key, partitionkey)
#   2. ingestor-omnipass     (params: reference=s3://bucket/key, partitionkey)
#
# Products land at the ROOT of datalake-uat-drop-bucket (no directory prefix):
#   s3://datalake-uat-drop-bucket/IMH01_0_ST__OPT8_20251219T....zip
#
# Correlation key: s3-key = "IMH01_0_ST__OPT8_....zip" (filename only)
# ============================================================

run_id: "baseline-run-001"

# --------------------------------------------------------
# Argo / Kubernetes namespaces
# --------------------------------------------------------
argo:
  namespace: "datalake"

  # Track both workflow templates (comma-separated, partial match).
  # The observer will collect both ingestion-dispatcher and ingestor-omnipass.
  workflow_template_filter: ""   # empty = observe all; narrow below via label

  # Label selector to narrow which workflows to watch.
  # Filters to the 'pdgs' partitionkey only — avoids picking up unrelated traffic.
  workflow_label_selector: "partitionkey=pdgs"

  # Argo Server REST API base URL.
  # When set, the collector tries this endpoint first.
  # If the server returns HTTP 401/403 (no RBAC for workflows.argoproj.io),
  # it automatically falls back to pod-based workflow reconstruction using
  # only `pods: [get list watch]` — which is sufficient for most limited RBAC setups.
  # Set to "" to skip the REST API entirely and use pod-based mode from the start.
  # Pod-based mode: leave server_url empty to skip the Argo REST API entirely
  # and go directly to workflow reconstruction from pod labels/annotations.
  # The IRIDE UAT RBAC does not grant access to workflows.argoproj.io CRDs,
  # so the REST API would return 403 anyway.
  server_url: ""
  token: ""
  verify_tls: true

# --------------------------------------------------------
# Kubernetes API
# --------------------------------------------------------
kubernetes:
  pod_namespaces:
    - "datalake"
  # Path to kubeconfig. Empty = ~/.kube/config.
  # If you saved the UAT kubeconfig to a dedicated file, set the full path here:
  #   kubeconfig: "/home/lvioli/kubeconfigs/uatmkpl.yaml"
  kubeconfig: ""
  # Context name from `kubectl config get-contexts`.
  # Rancher/RKE2 UAT context as configured in the kubeconfig above.
  context: "uatmkpl"

# --------------------------------------------------------
# STAC catalog
# --------------------------------------------------------
stac:
  # STAC polling endpoint.
  #
  # When running INSIDE the cluster (pod/job):
  #   Use the internal service URL — no token required.
  #   endpoint: "http://stac-api.datalake.svc/api"
  #
  # When running OUTSIDE the cluster (laptop / CI):
  #   Use the public endpoint and set a valid Bearer token below.
  #   The collector automatically switches to public_endpoint when a token is set.
  endpoint: "http://stac-api.datalake.svc/api"   # internal (no auth)

  # Public STAC endpoint (https://discover-uat.iride.earth).
  # Used as the polling endpoint when stac.token is set (external access).
  # Also used to build stac_url in kafka-message.json.
  public_endpoint: "https://discover-uat.iride.earth"

  # Bearer token for the public STAC endpoint.
  # Obtain via: curl -s -d "client_id=geo-commerce&grant_type=password&username=...
  #              &password=..." https://auth-uat.iride.earth/realms/marketplace/
  #              protocol/openid-connect/token | jq -r .access_token
  # Leave empty when using the internal endpoint from inside the cluster.
  token: ""

  # STAC collection id.
  # Left empty: resolved per-product from MinIO artifact (kafka-message.json).
  # Set explicitly only when artifact-based discovery is disabled or unavailable.
  # For partitionkey=pdgs check the collection field in kafka-message.json.
  collection_id: ""
  verify_tls: true

  # Re-ingestion note:
  # Products tracked by the observer are already present in the STAC catalog.
  # Publication of a new ingest cycle is confirmed by comparing the item's
  # properties.updated field against workflow_finished_at (omnipass completion).
  # stac_seen_at is set to properties.updated (catalog's own timestamp),
  # NOT to datetime.now() — this gives accurate stac_publish_sec KPIs.

# --------------------------------------------------------
# MinIO / S3 artifact access
# --------------------------------------------------------
# The omnipass exit-handler writes {workflow.uid}/kafka-message.json to MinIO.
# This artifact contains the exact STAC item id and collection — the most
# reliable STAC correlation source.
#
# Set credentials to enable artifact-based STAC discovery.
minio:
  endpoint: "s3.iride.earth"
  access_key: "4JNpgMzz469ctmm2WMhy"
  secret_key: "psK7sSXRQyITnuzjo7TxtkSDih8ne3Mz5ChirWGu"
  # Bucket where Argo stores workflow artifacts (matches Argo artifact repository config).
  artifact_bucket: "datalake-uat-workflows"
  # Drop bucket: where ingested products are deposited (watched for true T0).
  # Must match the dispatcher's s3-bucket parameter (default "drop-bucket").
  # If empty, T0 falls back to dispatcher workflow_created_at.
  drop_bucket: "datalake-uat-drop-bucket"
  drop_prefix: ""           # Products land at the root of the drop bucket (no collection prefix).
  drop_poll_sec: 15         # How often to list new objects in the drop-bucket.
  drop_lookback_sec: 120    # On startup, scan this many seconds back to catch in-flight objects.
  drop_orphan_sec: 180      # Flag as orphan if no dispatcher workflow seen within N seconds.
  secure: true

# --------------------------------------------------------
# Polling intervals (seconds)
# --------------------------------------------------------
polling:
  workflow_status_sec: 15      # Argo workflow list (TTL=1800s → must catch before expiry)
  pod_status_sec: 15           # Pod phase/timing — AGGRESSIVE due to podGC 30s on omnipass
  pod_metrics_sec: 20          # CPU/memory via Metrics Server — AGGRESSIVE for same reason
  stac_sec: 30                 # STAC API item visibility check
  artifact_check_sec: 20       # MinIO artifact check for completed omnipass workflows
  timeseries_flush_sec: 30     # Timeseries snapshot to disk

# --------------------------------------------------------
# Test duration / grace period
# --------------------------------------------------------
timing:
  # 0 = run until Ctrl-C.
  # Scenarios: smoke=900, baseline=1800, capacity=14400, soak=28800, validation=86400
  max_duration_sec: 1800
  # Extra time after injection ends: allow backlog to drain and STAC to publish.
  grace_period_sec: 300

# --------------------------------------------------------
# Correlation rules
# --------------------------------------------------------
# ARCHITECTURE:
#   MinIO drop-bucket/{s3-key}
#       │
#       └─► ingestion-dispatcher  (param: s3-key)
#               │  on success → Kafka iride.{partitionkey}.dispatched
#               │
#               └─► ingestor-omnipass  (param: reference = s3://drop-bucket/{s3-key})
#                       │  on success → writes {workflow.uid}/kafka-message.json
#                       │              containing stac_url, stac_item.id, stac_item.collection
#                       └─► STAC catalog
#
# SHARED IDENTIFIER: the s3 object key (= s3-key in dispatcher = path in reference in omnipass)
#
# CORRELATION PRIORITY:
#   1. Parameter-based (primary): read template-specific parameter from workflow spec
#   2. Artifact-based (STAC):     read {workflow.uid}/kafka-message.json from MinIO
#   3. Time-window fallback:      match by creation timestamp (unreliable at high concurrency)

correlation:
  # --- Dispatcher template ---
  # Template name substring to identify dispatcher workflows.
  dispatcher_template: "ingestion-dispatcher"
  # Parameter name in dispatcher that holds the MinIO object key (relative path).
  dispatcher_s3_key_param: "s3-key"
  # Parameter name in dispatcher that holds the bucket name.
  dispatcher_s3_bucket_param: "s3-bucket"

  # --- Omnipass template ---
  # Template name substring to identify omnipass workflows.
  omnipass_template: "ingestor-omnipass"
  # Parameter name in omnipass that holds the full S3 URL (s3://bucket/key).
  omnipass_reference_param: "reference"

  # --- Product ID extraction ---
  # Regex applied to the s3-key (or path extracted from reference) to get product_id.
  # Named group "product_id" is required.
  # Products land at root of drop-bucket → s3-key = "IMH01_0_ST__OPT8_....zip" (no directory prefix).
  # Extracts filename without extension: "IMH01_0_ST__OPT8_20251219T....zip" → "IMH01_0_ST__OPT8_20251219T...."
  product_id_from_s3_key: "(?P<product_id>[^/]+?)(?:\\.zip|\\.tar\\.gz|\\.tgz|\\.nc|\\.h5)?$"

  # --- STAC item ID derivation ---
  # Used as a FALLBACK when the MinIO artifact is not accessible.
  # If the STAC item id equals the product_id (filename without extension), leave as "{product_id}".
  # Otherwise adjust the template to match your calibrator's naming convention.
  stac_item_id_from_product_id: "{product_id}"

  # --- Artifact-based STAC discovery ---
  # When an omnipass workflow completes, attempt to read its kafka-message.json
  # artifact from MinIO to get the exact STAC item id and collection.
  # Requires minio.* credentials above.
  use_artifact_stac_discovery: true

  # --- Time-window fallback ---
  # Match workflows to products by creation timestamp proximity (last resort).
  time_window_fallback_sec: 60

# --------------------------------------------------------
# Step tracking
# --------------------------------------------------------
# Exact step names as they appear in Argo workflow status.
# dispatcher steps:
#   - main              (the actual dispatcher binary)
#   - message-passthrough
#   - send-message-success / send-message-failure
#
# omnipass steps:
#   - resolve-config    (partitionkey resolution, quick)
#   - prepare           (CWL parameter prep, has retryStrategy limit=2)
#   - argo-cwl          (calrissian runner — THE heavy step, spawns sub-pods)
#   - resolve-exit-config
#   - message-passthrough
#   - send-message-success / send-message-failure
#
# NOTE: omnipass has podGC: OnPodSuccess with deleteDelayDuration=30s.
# Succeeded pods are DELETED after 30s. Pod metrics must be collected
# while pods are Running, not after completion. The pod_metrics_sec
# polling interval above is set aggressively for this reason.
tracked_steps:
  # --- ingestion-dispatcher ---
  - "main"               # core dispatch logic
  # --- ingestor-omnipass ---
  - "resolve-config"     # partitionkey config resolution
  - "prepare"            # CWL param preparation (has retry)
  - "argo-cwl"           # calrissian runner (heaviest step, spawns sub-pods)
  - "resolve-exit-config"
  - "message-passthrough"
  - "send-message-success"
  - "send-message-failure"
  # --- argo-cwl-runner (sub-steps inside argo-cwl) ---
  - "cwl-prepare"        # prepares CWL document and inputs
  - "stage-in"           # stages in input data (Directory type)
  - "calrissian-argo-wf-runner"  # Calrissian K8s Job pod (actual CWL execution)
  - "get-results"        # reads output/log/report from /calrissian/
  - "stage-out"          # uploads STAC catalog to S3
  - "post-results"       # publishes to STAC API (conditional)

# --------------------------------------------------------
# Semaphore monitoring
# --------------------------------------------------------
# The ingestor-omnipass uses a semaphore to cap concurrent executions.
# Monitor the ConfigMap value to understand the concurrency ceiling.
semaphore:
  configmap_name: "semaphore-ingestors-uat"
  configmap_key: "workflow"
  namespace: "datalake"

# --------------------------------------------------------
# Output
# --------------------------------------------------------
output:
  base_dir: "./results"
  flush_every_n_records: 50
  # Save checkpoint every 5 minutes (safe against long-run crashes)
  checkpoint_interval_sec: 300
